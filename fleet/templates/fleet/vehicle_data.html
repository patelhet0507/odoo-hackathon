<script id="vehicles-json-data" type="application/json">
{
    {% for v in vehicles %}
    {% with active_trip=v.active_trip_list.0 last_maint=v.recent_maintenance_list.0 %}
    "{{ v.pk }}": {
        "id": "{{ v.pk }}",
        "registration_number": "{{ v.registration_number|escapejs }}",
        "name": "{{ v.name|escapejs }}",
        "model": "{{ v.model|default:v.name|escapejs }}",
        "type": "{{ v.vehicle_type|escapejs }}",
        "status": "{{ v.status|escapejs }}",
        "max_load": "{{ v.max_load_capacity|floatformat:0 }} kg",
        "odometer": "{{ v.odometer }} km",
        "region": "{{ v.region|default:'-'|escapejs }}",
        "health_score": {{ v.health_score }},
        "edit_url": "{% url 'fleet:vehicle_update' v.pk %}",
        {% if active_trip %}
        "trip": {
            "id": "{{ active_trip.id }}",
            "source": "{{ active_trip.source|escapejs }}",
            "destination": "{{ active_trip.destination|escapejs }}",
            "progress_percent": 60,
            "driver_name": "{{ active_trip.driver.name|escapejs }}",
            "driver_license": "{{ active_trip.driver.license_number|escapejs }}",
            "driver_image": null
        },
        {% else %}
        "trip": null,
        {% endif %}
        "last_maintenance": {
            {% if last_maint %}
            "description": "{{ last_maint.description|default:'Maintenance'|escapejs }}",
            "date": "{{ last_maint.completed_date|default:last_maint.scheduled_date|date:"Y-m-d" }}",
            "status": "{{ last_maint.status|escapejs }}"
            {% else %}
            "description": "No maintenance history recorded.",
            "date": "N/A",
            "status": "Closed"
            {% endif %}
        }
    }{% if not forloop.last %},{% endif %}
    {% endwith %}
    {% endfor %}
}
</script>
