{% extends 'base.html' %}
{% block title %}Fuel Logs{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h4><i class="bi bi-fuel-pump"></i> Fuel Logs</h4>
    <a href="{% url 'fleet:fuel_create' %}" class="btn btn-primary btn-sm"><i class="bi bi-plus-lg"></i> Record Fuel</a>
</div>
<div class="card">
    <div class="card-body">
        <form method="get" class="row g-2 mb-3">
            <div class="col-auto"><input type="text" name="q" class="form-control form-control-sm" placeholder="Search vehicle..." value="{{ query }}"></div>
            <div class="col-auto"><button class="btn btn-sm btn-outline-primary" type="submit">Search</button></div>
        </form>
        <div class="table-responsive">
            <table class="table table-hover table-sm">
                <thead>
                    <tr>
                        <th>Vehicle</th>
                        <th>Liters</th>
                        <th>Cost</th>
                        <th>Date</th>
                    </tr>
                </thead>
                <tbody>
                    {% for f in fuels %}
                    <tr>
                        <td>{{ f.vehicle.registration_number }}</td>
                        <td>{{ f.liters }}</td>
                        <td>${{ f.cost }}</td>
                        <td>{{ f.date }}</td>
                    </tr>
                    {% empty %}
                    <tr><td colspan="4" class="text-center text-muted">No fuel records.</td></tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}
